# Настройки программы
settings:
  logs: false # вкл логов в каталоге rosorter. logs.txt
  daemon: false # Включение демона(будет находится в трее)
  timeout: "60m" # время сортировки(0m сортировка ручная по требованию юзера)
  silent: true # Работа в тихую без вывода уведов об сортировке
  language: "ru-RU" # Настройка языка

# Настройки
directories:
  # Каждый каталог: каждый блок настройки
  example:
    path: '/путь/к/каталогу'
    # Указание расширений которые будут сортироваться(названия с . не парсятся)
    # * - Сортирует все что есть в каталоге, остальное пропускается
    files: ['*, или расширение файла'] 
    # Сортирует в тот каталог, который вы назовете
    names:
    # Расширение: каталог
    # "*": "*" сортирует все расширения файлов указанные в files
      - "*": "*"
      - "exe": "Executables"